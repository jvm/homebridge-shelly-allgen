name: Publish

# The first npm publish is done manually with `npm publish` from a local
# checkout. Afterwards, configure trusted publishing (OIDC) for this repo and
# workflow on npmjs.com — no NPM_TOKEN secret is needed once that is in place.

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - name: Check npm version
        id: npm-version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if npm view "homebridge-shelly-allgen@$VERSION" version >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
            echo "homebridge-shelly-allgen@$VERSION is already published; skipping npm publish."
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi
      # Trusted publishing (OIDC) requires npm >= 11.5.1. Run it through npx
      # rather than `npm install -g npm@latest`, which can crash mid-self-upgrade.
      - run: npx -y npm@latest publish
        if: steps.npm-version.outputs.published != 'true'
